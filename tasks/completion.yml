- name: Ensure completions directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/completions"
    state: directory
    mode: "0755"

- name: Generate uv and uvx zsh completions
  ansible.builtin.command:
    cmd: "{{ uv_install_dir }}/{{ item }} generate-shell-completion zsh"
  register: completion_results
  changed_when: false
  loop:
    - uv
    - uvx

- name: Store uv and uvx zsh completions
  ansible.builtin.copy:
    dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/completions/_{{ item.item }}"
    content: "{{ item.stdout }}"
    mode: "0644"
  loop: "{{ completion_results.results }}"
