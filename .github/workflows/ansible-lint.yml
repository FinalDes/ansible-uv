# documentation only
# only to record how is use offcial ansible lint github action to check linting
name: Ansible Lint for Galaxy Role

on:
  pull_request:
    branches:
      - "main"
  push:
    branches:
      - "main"

jobs:
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6.0.2

      - name: Run ansible-lint
        uses: ansible/ansible-lint@v26.1.1 # Use a stable version, check for latest at github.com/ansible/ansible-lint/releases
        with:
          working_directory: "" # Root of the role (where tasks/, defaults/, etc. are)
          setup_python: "true" # Ensures Python is set up
          python_version: "3.14" # Specify Python version if needed
          requirements_file: "requirements.yml" # If your role depends on collections
